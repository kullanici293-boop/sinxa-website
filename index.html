<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SINXA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#090909;
color:white;

}

header{

display:flex;
justify-content:space-between;
align-items:center;
padding:25px 10%;

}

.logo{

font-size:32px;
font-weight:bold;
color:#d4af37;

}

nav a{

color:white;
text-decoration:none;
margin-left:25px;
transition:.3s;

}

nav a:hover{

color:#d4af37;

}

.hero{

height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;

}

.hero h1{

font-size:72px;
color:#d4af37;

}

.hero p{

font-size:22px;
margin-top:20px;
color:#ddd;
max-width:700px;

}

.buttons{

margin-top:40px;

}

.btn{

display:inline-block;
padding:16px 38px;
margin:10px;
background:#d4af37;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:50px;
transition:.3s;

}

.btn:hover{

transform:translateY(-3px);

}

</style>

</head>

<body>

<header>

<div class="logo">
SINXA
</div>

<nav>

<a href="#">Home</a>

<a href="#">About</a>

<a href="#">Roadmap</a>

<a href="#">Community</a>

</nav>

</header>

<section class="hero">

<h1>SINXA</h1>

<p>

Building the Future of Web3

</p>

<div class="buttons">

<a href="https://t.me/SINXAOfficial" class="btn">

Join Telegram

</a>

<a href="https://x.com/sinxaToken" class="btn">

Follow on X

</a>

</div>

</section>

</body>

</html>
